apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ai-review-service
  namespace: default
  labels:
    app: ai-review-service
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-review-service
  template:
    metadata:
      labels:
        app: ai-review-service
    spec:
      serviceAccountName: ai-review-service
      containers:
        - name: ai-review-service
          image: ghcr.io/mihaicatalin22/questify-ai-review-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - { name: SPRING_PROFILES_ACTIVE, value: "prod" }
            - { name: SERVER_PORT, value: "8080" }
            - { name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE, value: "health,info,prometheus" }
            - { name: MANAGEMENT_HEALTH_PROBES_ENABLED, value: "true" }
            - { name: SPRING_DATASOURCE_URL, value: "jdbc:mysql://mysql:3306/aireview?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC" }
            - { name: SPRING_DATASOURCE_USERNAME, value: "root" }
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: mysql-root, key: password } }
            - { name: KAFKA_BOOTSTRAP_SERVERS, value: "questify-kafka-kafka-bootstrap.kafka.svc:9092" }
            - { name: APP_ENV, value: "dev" }
            - { name: OIDC_ISSUER, value: "https://questify.tail03c40b.ts.net/auth/realms/questify" }
            - { name: OIDC_JWKS, value: "https://questify.tail03c40b.ts.net/auth/realms/questify/protocol/openid-connect/certs" }
            - { name: QUEST_SERVICE_BASE, value: "http://quest-service" }
            - { name: PROOF_SERVICE_BASE, value: "http://proof-service" }
            - { name: SUBMISSION_SERVICE_BASE, value: "http://submission-service" }
            - { name: AI_REVIEW_RUNTIME_BASE_URL, value: "http://host.docker.internal:11434" }
            - { name: AI_REVIEW_MODEL_PRIMARY, value: "qwen2.5vl:3b" }
            - { name: AI_REVIEW_MODEL_FALLBACK, value: "" }
            - { name: AI_REVIEW_TIMEOUT_MS, value: "120000" }
            - { name: AI_REVIEW_KEEP_ALIVE, value: "10m" }
            - { name: AI_REVIEW_MAX_OUTPUT_TOKENS, value: "220" }
            - name: INTERNAL_TOKEN
              valueFrom: { secretKeyRef: { name: internal-token, key: token } }
            - { name: JAVA_OPTS, value: "-XX:MaxRAMPercentage=75 -XX:+AlwaysActAsServerClassMachine" }
          startupProbe:
            httpGet: { path: /actuator/health/liveness, port: http }
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 120
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: http }
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: http }
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests: { cpu: "100m", memory: "384Mi" }
            limits: { cpu: "750m", memory: "768Mi" }
  strategy:
    canary:
      maxSurge: 1
      maxUnavailable: 0
      steps:
        - setWeight: 100
