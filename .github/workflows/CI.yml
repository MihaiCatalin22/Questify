name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ───────────────────────────
  # Security • GitGuardian (secret scanning)
  # ───────────────────────────
  gitguardian-scan:
    name: GitGuardian • Secret Scan
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitGuardian scan
        uses: GitGuardian/ggshield/actions/secret@v1.45.0
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  # ───────────────────────────
  # Security • Trivy (repo filesystem scan)
  # ───────────────────────────
  trivy-fs:
    name: Trivy • Repo Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull Trivy image
        shell: bash
        run: |
          set -euo pipefail
          docker pull ghcr.io/aquasecurity/trivy:0.68.2

      - name: Trivy filesystem scan (report)
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${PWD}:/workdir" \
            -w /workdir \
            ghcr.io/aquasecurity/trivy:0.68.2 \
            fs \
            --scanners vuln,config \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format table \
            --output /workdir/trivy-fs-report.txt \
            --exit-code 0 \
            /workdir

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-report.txt
          if-no-files-found: ignore

  # ───────────────────────────
  # Quest Service
  # ───────────────────────────
  quest-service:
    name: Quest Service • Build, Test & Sonar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.10.2

      - name: Build & Test
        run: |
          gradle --no-daemon -p quest-service clean test
          if gradle -q -p quest-service tasks --all | grep -q '^jacocoTestReport'; then
            gradle --no-daemon -p quest-service jacocoTestReport
          else
            echo "JaCoCo not configured in quest-service"
          fi

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quest-tests
          path: quest-service/build/reports/tests/test/**
          if-no-files-found: ignore

      - name: Upload JaCoCo XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quest-jacoco-xml
          path: quest-service/build/reports/jacoco/test/jacocoTestReport.xml
          if-no-files-found: ignore

      - name: SonarCloud Scan (quest-service)
        if: >
          (github.event_name == 'push' && github.ref_name == 'main') ||
          (github.event_name == 'pull_request' && github.base_ref == 'main' &&
           github.event.pull_request.head.repo.full_name == github.repository) ||
          (github.event_name == 'workflow_dispatch')
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SONAR_TOKEN:-}" ]; then
            echo "Missing repository secret SONAR_TOKEN."
            exit 1
          fi
          curl -sf -u "${SONAR_TOKEN}:" "https://sonarcloud.io/api/authentication/validate" | tee sonar-auth.json
          grep -q '"valid":true' sonar-auth.json
          curl -sf -u "${SONAR_TOKEN}:" "https://sonarcloud.io/api/projects/search?organization=mihaicatalin22&projects=questify__quest-service" | tee sonar-project.json
          grep -q '"total":1' sonar-project.json

      - name: SonarCloud Scan (quest-service)
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        if: >
          (github.event_name == 'push' && github.ref_name == 'main') ||
          (github.event_name == 'pull_request' && github.base_ref == 'main' &&
           github.event.pull_request.head.repo.full_name == github.repository) ||
          (github.event_name == 'workflow_dispatch')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: quest-service

